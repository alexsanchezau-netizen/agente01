<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Paula — Premier Real Estate</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name">BrandingWeb iA — Demo en vivo</div>
  </div>
  <div class="chat-card">
    <div class="chat-header">
      <div class="avatar-wrap">
        <div class="avatar">P</div>
        <div class="avatar-status"></div>
      </div>
      <div class="header-info">
        <div class="header-name">Agente Paula</div>
        <div class="header-sub">Premier Real Estate · IA activa 24/7</div>
      </div>
      <div class="live-pill"><div class="live-dot"></div>En vivo</div>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input-area">
      <input class="chat-input" id="userInput" placeholder="Escribe tu mensaje..." autocomplete="off" />
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-value">94</div><div class="metric-label">Leads este mes</div></div>
      <div class="metric"><div class="metric-value">68%</div><div class="metric-label">Open rate</div></div>
      <div class="metric"><div class="metric-value">23</div><div class="metric-label">Citas agendadas</div></div>
    </div>
  </div>
  <div class="powered">Impulsado por <span>Claude AI</span> · BrandingWeb iA</div>
</div>
<script src="app.js"></script>
</body>
</html>
